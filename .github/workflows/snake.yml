name: generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:        # run manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVG (Elden Ring gold)
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # dots go empty -> full: dark parchment through Erdtree gold; snake is gold
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=%23D4AF37&color_dots=%23241f13,%236b5417,%238a6d1f,%23D4AF37,%23f5e29a

      - name: Push SVG to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
