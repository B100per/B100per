name: generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:        # run manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVG (L4D2 infected amber/red)
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # empty cell is lifted off the page bg so the grid lines actually read;
          # dots climb empty -> full through infected amber; snake is blood red.
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=%23A01812&color_dots=%232b2620,%235a3a16,%238a5a1e,%23c07f2a,%23E8A33D
            dist/snake-light.svg?palette=github-light&color_snake=%23A01812&color_dots=%23ebedf0,%23e8c088,%23d08a3c,%23a05a20,%23703a12

      - name: Push SVG to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
