name: generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:        # run manually from the Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVG (Elden Ring gold)
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          # empty cell is lifted off the page bg so the grid lines actually read;
          # dots climb empty -> full through Erdtree gold. dark + light variants.
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=%23D4AF37&color_dots=%232d2a18,%236b5417,%238a6d1f,%23D4AF37,%23f5e29a
            dist/snake-light.svg?palette=github-light&color_snake=%238a6d1f&color_dots=%23ebedf0,%23e3cd86,%23c2a24a,%238a6d1f,%236b5417

      - name: Push SVG to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
