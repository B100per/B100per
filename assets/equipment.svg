<svg width="820" height="600" viewBox="0 0 820 600" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#1b1810"/>
      <stop offset="60%" stop-color="#14120b"/>
      <stop offset="100%" stop-color="#0a0906"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="45%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8a6d1f"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b1717"/>
      <stop offset="55%" stop-color="#b83030"/>
      <stop offset="100%" stop-color="#f07a6a"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffe0d5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clipFlask"><rect x="200" y="500" width="288" height="16" rx="8"/></clipPath>
  </defs>

  <!-- panel background + frame -->
  <rect x="4" y="4" width="812" height="592" rx="6" fill="url(#bg)"/>
  <rect x="14" y="14" width="792" height="572" rx="4" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.9"/>
  <rect x="21" y="21" width="778" height="558" rx="3" fill="none" stroke="#8a7a3d" stroke-width="1" opacity="0.55"/>

  <!-- ornamental corners -->
  <g stroke="url(#gold)" stroke-width="2" fill="none" opacity="0.95">
    <path d="M14 40 L14 14 L40 14"/><path d="M780 14 L806 14 L806 40"/>
    <path d="M14 560 L14 586 L40 586"/><path d="M780 586 L806 586 L806 560"/>
  </g>
  <g fill="url(#gold)">
    <circle cx="24" cy="24" r="2.5"/><circle cx="796" cy="24" r="2.5"/>
    <circle cx="24" cy="576" r="2.5"/><circle cx="796" cy="576" r="2.5"/>
  </g>

  <!-- title -->
  <text x="410" y="64" text-anchor="middle" fill="url(#gold)" font-size="28" letter-spacing="9" filter="url(#glow)">EQUIPMENT</text>
  <g stroke="url(#gold)" stroke-width="1.4" opacity="0.85">
    <line x1="120" y1="78" x2="360" y2="78"/><line x1="460" y1="78" x2="700" y2="78"/>
  </g>
  <path d="M410 72 l9 6 -9 6 -9 -6 z" fill="url(#gold)"/>

  <!-- center divider between columns -->
  <line x1="410" y1="104" x2="410" y2="424" stroke="#3a331d" stroke-width="1"/>

  <!-- ============ LEFT COLUMN ============ -->
  <!-- weapons -->
  <text x="56" y="118" fill="#8a7a3d" font-size="13" letter-spacing="4">ARMAMENTS</text>
  <g font-size="12" fill="#8a7a3d" letter-spacing="1">
    <text x="56" y="150">Right Hand 1</text>
    <text x="56" y="180">Right Hand 2</text>
    <text x="56" y="210">Left Hand 1</text>
    <text x="56" y="240">Left Hand 2</text>
  </g>
  <g font-size="15" fill="#e8dfc2" letter-spacing="0.5">
    <text x="160" y="150">Godot Engine <tspan fill="#D4AF37">+10</tspan></text>
    <text x="160" y="180">Unity Blade <tspan fill="#D4AF37">+7</tspan></text>
    <text x="160" y="210">Figma Torch</text>
    <text x="160" y="240">Go Crossbow</text>
  </g>
  <g font-size="11" fill="#7d7147" font-style="italic">
    <text x="290" y="150">keen infusion</text>
    <text x="270" y="210">illuminates designs</text>
  </g>

  <!-- armor -->
  <text x="56" y="290" fill="#8a7a3d" font-size="13" letter-spacing="4">ARMOR</text>
  <g font-size="12" fill="#8a7a3d" letter-spacing="1">
    <text x="56" y="322">Head</text>
    <text x="56" y="352">Chest</text>
    <text x="56" y="382">Arms</text>
    <text x="56" y="412">Legs</text>
  </g>
  <g font-size="15" fill="#e8dfc2" letter-spacing="0.5">
    <text x="160" y="322">Headphones of Focus</text>
    <text x="160" y="352">Hoodie of the Tarnished Dev</text>
    <text x="160" y="382">Mechanical Keyboard Gauntlets</text>
    <text x="160" y="412">Greaves of Sitting Too Long</text>
  </g>

  <!-- ============ RIGHT COLUMN ============ -->
  <text x="452" y="118" fill="#8a7a3d" font-size="13" letter-spacing="4">TALISMANS</text>
  <g>
    <!-- t1 -->
    <path d="M452 146 l6 5 -6 5 -6 -5 z" fill="url(#gold)"/>
    <text x="470" y="155" fill="#e8dfc2" font-size="15">Coffee Scarab</text>
    <text x="470" y="173" fill="#7d7147" font-size="11" font-style="italic">restores FP slowly</text>
    <!-- t2 -->
    <path d="M452 210 l6 5 -6 5 -6 -5 z" fill="url(#gold)"/>
    <text x="470" y="219" fill="#e8dfc2" font-size="15">Git Icon</text>
    <text x="470" y="237" fill="#7d7147" font-size="11" font-style="italic">undo death once</text>
    <!-- t3 -->
    <path d="M452 274 l6 5 -6 5 -6 -5 z" fill="url(#gold)"/>
    <text x="470" y="283" fill="#e8dfc2" font-size="15">Rubber Duck Crest</text>
    <text x="470" y="301" fill="#7d7147" font-size="11" font-style="italic">boosts bug discovery</text>
    <!-- t4 -->
    <path d="M452 338 l6 5 -6 5 -6 -5 z" fill="url(#gold)"/>
    <text x="470" y="347" fill="#e8dfc2" font-size="15">Claude's Great Rune</text>
    <text x="470" y="365" fill="#7d7147" font-size="11" font-style="italic">summons an AI cooperator</text>
  </g>

  <!-- ============ FLASK BAR ============ -->
  <line x1="56" y1="452" x2="764" y2="452" stroke="#4a4026" stroke-width="1"/>
  <text x="56" y="490" fill="#d8d0b8" font-size="14" letter-spacing="1">Flask of Crimson Tears</text>
  <text x="56" y="490" fill="#7d7147" font-size="11" font-style="italic" dx="180">(espresso)</text>
  <rect x="200" y="500" width="360" height="16" rx="8" fill="#241f13" stroke="#4a4026" stroke-width="1"/>
  <rect x="200" y="500" width="288" height="16" rx="8" fill="url(#barFill)"/>
  <g clip-path="url(#clipFlask)"><rect x="-90" y="500" width="90" height="16" fill="url(#sheen)"><animate attributeName="x" from="110" to="500" dur="2.5s" repeatCount="indefinite"/></rect></g>
  <text x="576" y="513" fill="#c8bfa0" font-size="12" letter-spacing="1">8 / 10</text>

  <!-- footer -->
  <line x1="120" y1="544" x2="700" y2="544" stroke="#4a4026" stroke-width="1"/>
  <text x="410" y="572" text-anchor="middle" fill="#8a7a3d" font-size="12" font-style="italic" letter-spacing="1">"Well-equipped, Tarnished. Now, to battle."</text>
</svg>
